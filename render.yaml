services:
  - type: web
    name: scraper-hub
    env: python
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright